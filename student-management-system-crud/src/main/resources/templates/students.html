<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Students List</title>
</head>

<body>

	<h2>Students List</h2>

	<a th:href="@{/students/add}">Add Student</a>

	<table border="1">

		<tr>
			<th>ID</th>
			<th>First Name</th>
			<th>Last Name</th>
			<th>Email</th>
			<th>Edit</th>
			<th>Delete</th>
		</tr>

		<tr th:each="student : ${students}">
			<td th:text="${student.id}"></td>
			<td th:text="${student.fName}"></td>
			<td th:text="${student.lName}"></td>
			<td th:text="${student.email}"></td>

			<td><a th:href="@{/students/update/{id}(id=${student.id})}">Edit</a>
			</td>

			<td><a th:href="@{/students/remove/{id}(id=${student.id})}">Delete</a>
			</td>

		</tr>

	</table>

</body>
</html>
